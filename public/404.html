<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ResendBox</title>
    <script>
      (function () {
        var searchParams = new URLSearchParams(window.location.search);

        if (searchParams.has("redirect")) {
          return;
        }

        var base = window.location.pathname.indexOf("/resendbox/") === 0 ? "/resendbox/" : "/";
        var redirect = window.location.pathname + window.location.search + window.location.hash;
        window.location.replace(base + "?redirect=" + encodeURIComponent(redirect));
      })();
    </script>
  </head>
  <body></body>
</html>
